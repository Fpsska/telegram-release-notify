name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ReleaseNotify-windows
          - os: macos-latest        # Apple Silicon (arm64)
            artifact: ReleaseNotify-macos-arm64
          - os: macos-15-intel      # Intel (x86_64), runner доступен до августа 2027
            artifact: ReleaseNotify-macos-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - run: python -m PyInstaller build.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item dist/ReleaseNotify.exe "${{ matrix.artifact }}.exe"
        shell: pwsh

      - name: Package (macOS)
        if: runner.os == 'macOS'
        # ditto сохраняет права и структуру .app; обычный zip ломает бандл
        run: ditto -c -k --keepParent dist/ReleaseNotify.app "${{ matrix.artifact }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.exe
            ${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ReleaseNotify-windows.exe
            ReleaseNotify-macos-arm64.zip
            ReleaseNotify-macos-intel.zip
